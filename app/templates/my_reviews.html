{% extends 'base.html' %}

{% block content %}
<h1>Мои рецензии</h1>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>Книга</th>
            <th>Оценка</th>
            <th>Текст</th>
            <th>Статус</th>
        </tr>
    </thead>

    <tbody>
        {% for review in reviews %}
            <tr>
                <td>{{ review.book.title }}</td>
                <td>{{ review.rating }} — {{ RATINGS[review.rating] }}</td>
                <td>{{ review.text }}</td>
                <td>{{ review.status.name }}</td>
            </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
