{% macro render_book_form(book, genres, action_url, submit_text) %}
<form method="post" action="{{ action_url }}" enctype="multipart/form-data">
    <div class="mb-3">
        <label for="title" class="form-label">Название</label>
        <input
            type="text"
            class="form-control"
            id="title"
            name="title"
            value="{{ book.title if book else request.form.get('title', '') }}"
            required
        >
    </div>

    <div class="mb-3">
        <label for="short_description" class="form-label">Краткое описание</label>
        <textarea
            class="form-control"
            id="short_description"
            name="short_description"
            rows="8"
            required
        >{{ book.short_description if book else request.form.get('short_description', '') }}</textarea>
        <div class="form-text">Можно использовать Markdown.</div>
    </div>

    <div class="mb-3">
        <label for="year" class="form-label">Год</label>
        <input
            type="number"
            class="form-control"
            id="year"
            name="year"
            value="{{ book.year if book else request.form.get('year', '') }}"
            required
        >
    </div>

    <div class="mb-3">
        <label for="publisher" class="form-label">Издательство</label>
        <input
            type="text"
            class="form-control"
            id="publisher"
            name="publisher"
            value="{{ book.publisher if book else request.form.get('publisher', '') }}"
            required
        >
    </div>

    <div class="mb-3">
        <label for="author" class="form-label">Автор</label>
        <input
            type="text"
            class="form-control"
            id="author"
            name="author"
            value="{{ book.author if book else request.form.get('author', '') }}"
            required
        >
    </div>

    <div class="mb-3">
        <label for="pages" class="form-label">Объём в страницах</label>
        <input
            type="number"
            class="form-control"
            id="pages"
            name="pages"
            value="{{ book.pages if book else request.form.get('pages', '') }}"
            required
        >
    </div>

    <div class="mb-3">
        <label for="genres" class="form-label">Жанры</label>
        <select class="form-select" id="genres" name="genres" multiple required>
            {% for genre in genres %}
                <option value="{{ genre.id }}"
                    {% if book and genre in book.genres %}
                        selected
                    {% elif not book and genre.id|string in request.form.getlist('genres') %}
                        selected
                    {% endif %}
                >
                    {{ genre.name }}
                </option>
            {% endfor %}
        </select>
        <div class="form-text">Можно выбрать несколько жанров.</div>
    </div>

    {% if not book %}
        <div class="mb-3">
            <label for="cover" class="form-label">Обложка</label>
            <input
                type="file"
                class="form-control"
                id="cover"
                name="cover"
                accept="image/*"
                required
            >
        </div>
    {% endif %}

    <button type="submit" class="btn btn-primary">{{ submit_text }}</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endmacro %}
